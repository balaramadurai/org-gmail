name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-elisp:
    name: ERT Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '29.4'

      - name: Run ERT tests
        run: |
          emacs --batch \
            --eval "(add-to-list 'load-path \".\")" \
            --eval "(add-to-list 'load-path \"./tests\")" \
            -l org \
            -l org-gmail \
            -l tests/test_org_gmail.el \
            -f ert-run-tests-batch-and-exit

  lint:
    name: Package Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: '29.4'

      - name: Install package-lint
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'package-lint)"

      - name: Run package-lint
        run: |
          emacs --batch \
            --eval "(require 'package)" \
            --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
            --eval "(package-initialize)" \
            -l package-lint \
            --eval "(package-lint-batch-and-exit)" \
            org-gmail.el

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest google-api-python-client google-auth-httplib2 \
            google-auth-oauthlib html2text pytz

      - name: Run Python tests
        run: pytest tests/test_gmail_label_manager.py -v
